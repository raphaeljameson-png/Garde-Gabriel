<!DOCTYPE html>  
<html lang="fr">  
<head>

    <style>

            --app-bg:#f2f2f7;--text:#000;--muted:#8e8e93;--card:#fff;  
            --tab-bg:rgba(255,255,255,.85);--border:rgba(60,60,67,.29);  
            --papa:#007AFF;--maman:#FF3B30;--papa-bg:rgba(0,122,255,.12);--maman-bg:rgba(255,59,48,.12);

            --seg:rgba(118,118,128,.12);--seg-on:#fff;--safe:env(safe-area-inset-bottom,20px);  
        }  
        @media(prefers-color-scheme:dark){:root{  
            --app-bg:#000;--text:#fff;--muted:rgba(235,235,245,.6);--card:#1c1c1e;  
            --tab-bg:rgba(28,28,30,.85);--border:rgba(84,84,88,.65);  
            --papa-bg:rgba(10,132,255,.25);--maman-bg:rgba(255,69,58,.25);  
            --religious:#BF5AF2;--ferie:#30D158;--seg:rgba(118,118,128,.24);--seg-on:#636366;  
        }}  
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}  
        body{margin:0;background:#e5e5ea;display:flex;justify-content:center}  
        .app{width:100%;max-width:450px;background:var(--app-bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:calc(75px + var(--safe))}  
        .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:450px;height:calc(55px + var(--safe));background:var(--tab-bg);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border-top:.5px solid var(--border);display:flex;padding-bottom:var(--safe);z-index:999}  
        .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:10px;font-weight:500;cursor:pointer}  
        .tab.on{color:var(--papa)} .tab-icon{font-size:22px;margin-bottom:2px}  
        .view{display:none;padding:20px;padding-top:max(30px,env(safe-area-inset-top));animation:fu .25s ease}  
        .view.on{display:block}  
        @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}  
        h1{font-size:32px;font-weight:700;letter-spacing:-.5px;margin:0 0 18px}

        .row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:.5px solid var(--border);font-size:15px}  
        .row:last-child{border-bottom:none}  
        .rl{display:flex;flex-direction:column;gap:3px} .rt{font-weight:500} .rs{font-size:12px;color:var(--muted)}  
        .tp{color:var(--papa);font-weight:700} .tm{color:var(--maman);font-weight:700}  
        .seg-ctrl{display:flex;background:var(--seg);border-radius:9px;padding:2px;margin-bottom:18px}

        .seg-btn.on{background:var(--seg-on);box-shadow:0 2px 6px rgba(0,0,0,.12)}

        .circle.maman{background:var(--maman-bg);color:var(--maman);border-color:var(--maman)}  
        .hero-date{font-size:16px;color:var(--muted);margin-bottom:20px}  
        .hero-reason{font-size:13px;color:var(--muted);margin-top:8px;padding:0 20px;line-height:1.5}  
        .version-tag{text-align:center;font-size:10px;color:var(--muted);margin-top:4px;opacity:.7}  
        .btn{border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;width:100%;cursor:pointer;margin-top:8px;display:block;text-align:center}

        .btn:active{opacity:.75} .btn-row{display:flex;gap:10px;margin-top:10px} .btn-row .btn{flex:1;margin-top:0}

        .nav-btn{background:var(--seg);border:none;border-radius:50%;width:32px;height:32px;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}  
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}

        .legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:11px;color:var(--muted);margin:14px 0 6px}

        .dist-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;background:var(--seg);margin:12px 0 8px}

<body>  
<div class="app">

</div>  

<script>  
/* ═══════════════════════════════════════════════════════  
   GARDE GABRIEL — v10 — 09/07/2025 02:30  
   ═══════════════════════════════════════════════════════  
   JUGEMENT DU 06/02/2026 — PAGES 7-8  
   
   HIÉRARCHIE STRICTE :  
   1. Exception manuelle  
   2. Fête des Mères / Pères  
   3. Vacances scolaires (PRIMAUTÉ ABSOLUE)  
   4. Fêtes juives ALTERNÉES (paire=Papa, impaire=Maman)  
      SAUF si pendant vacances → absorbées par vacances  
   5. Jours fériés attenants (extension du bloc Papa)  
   6. Roulement :  
      S. PAIRES  → Ven+Sam+Dim+Lun = Papa  
      S. IMPAIRES → Mer+Jeu = Papa  
      Reste = Maman  
   ═══════════════════════════════════════════════════════ */  

const APP_VERSION = "v10";  
const APP_BUILD = "09/07/2025 02:30";  

if(localStorage.getItem('app_version')!==APP_VERSION){  
    ['gabriel_school_holidays','gabriel_religious_holidays','gabriel_last_sync'].forEach(k=>localStorage.removeItem(k));  
    localStorage.setItem('app_version',APP_VERSION);  
}  

let exceptions=JSON.parse(localStorage.getItem('gabriel_exceptions')||'{}');  
const saveEx=()=>localStorage.setItem('gabriel_exceptions',JSON.stringify(exceptions));  

const d2s=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;  
const s2d=s=>{const[y,m,j]=s.split('-').map(Number);return new Date(y,m-1,j,12,0,0)};  

// Gabriel né le 21/09/2022 → 6 ans révolus le 21/09/2028  
const GABRIEL_6ANS=new Date(2028,8,21,12,0,0);  

/* ── VACANCES SCOLAIRES Zone C 2024-2030 ── */  
let schoolHols=JSON.parse(localStorage.getItem('gabriel_school_holidays')||'null')||[  
    {n:"Toussaint",s:"2024-10-19",e:"2024-11-03",mid:"2024-10-26"},  
    {n:"Noël",s:"2024-12-21",e:"2025-01-05",mid:"2024-12-28"},  
    {n:"Hiver",s:"2025-02-15",e:"2025-03-02",mid:"2025-02-22"},  
    {n:"Printemps",s:"2025-04-12",e:"2025-04-27",mid:"2025-04-19"},  
    {n:"Été",s:"2025-07-05",e:"2025-08-31",summer:true},  
    {n:"Toussaint",s:"2025-10-18",e:"2025-11-02",mid:"2025-10-25"},  
    {n:"Noël",s:"2025-12-20",e:"2026-01-04",mid:"2025-12-27"},  
    {n:"Hiver",s:"2026-02-21",e:"2026-03-08",mid:"2026-02-28"},  
    {n:"Printemps",s:"2026-04-18",e:"2026-05-03",mid:"2026-04-25"},  
    {n:"Été",s:"2026-07-04",e:"2026-08-31",summer:true},  
    {n:"Toussaint",s:"2026-10-17",e:"2026-11-01",mid:"2026-10-24"},  
    {n:"Noël",s:"2026-12-19",e:"2027-01-03",mid:"2026-12-26"},  
    {n:"Hiver",s:"2027-02-20",e:"2027-03-07",mid:"2027-02-27"},  
    {n:"Printemps",s:"2027-04-17",e:"2027-05-02",mid:"2027-04-24"},  
    {n:"Été",s:"2027-07-06",e:"2027-08-31",summer:true},  
    {n:"Toussaint",s:"2027-10-23",e:"2027-11-07",mid:"2027-10-30"},  
    {n:"Noël",s:"2027-12-18",e:"2028-01-02",mid:"2027-12-25"},  
    {n:"Hiver",s:"2028-02-19",e:"2028-03-05",mid:"2028-02-26"},  
    {n:"Printemps",s:"2028-04-15",e:"2028-04-30",mid:"2028-04-22"},  
    {n:"Été",s:"2028-07-06",e:"2028-08-31",summer:true},  
    {n:"Toussaint",s:"2028-10-21",e:"2028-11-05",mid:"2028-10-28"},  
    {n:"Noël",s:"2028-12-23",e:"2029-01-07",mid:"2028-12-30"},  
    {n:"Hiver",s:"2029-02-17",e:"2029-03-04",mid:"2029-02-24"},  
    {n:"Printemps",s:"2029-04-14",e:"2029-04-29",mid:"2029-04-21"},  
    {n:"Été",s:"2029-07-06",e:"2029-08-31",summer:true},  
    {n:"Toussaint",s:"2029-10-20",e:"2029-11-04",mid:"2029-10-27"},  
    {n:"Noël",s:"2029-12-22",e:"2030-01-06",mid:"2029-12-29"},  
    {n:"Hiver",s:"2030-02-23",e:"2030-03-10",mid:"2030-03-02"},  
    {n:"Printemps",s:"2030-04-20",e:"2030-05-05",mid:"2030-04-27"},  
    {n:"Été",s:"2030-07-06",e:"2030-08-31",summer:true}  
];  

/* ── FÊTES JUIVES (base, enrichie via HebCal) ── */  
let relHols=JSON.parse(localStorage.getItem('gabriel_religious_holidays')||'null')||{  
    "2024-10-03":"Roch Hachana","2024-10-04":"Roch Hachana (J2)","2024-10-12":"Kippour",  
    "2024-12-26":"Hanouka (1er jour)","2025-01-02":"Hanouka (Dernier jour)",  
    "2025-03-14":"Pourim","2025-04-13":"Pessah (J1)","2025-04-14":"Pessah (J2)",  
    "2025-09-23":"Roch Hachana","2025-09-24":"Roch Hachana (J2)","2025-10-02":"Kippour",  
    "2025-12-15":"Hanouka (1er jour)","2025-12-22":"Hanouka (Dernier jour)",  
    "2026-03-03":"Pourim","2026-04-02":"Pessah (J1)","2026-04-03":"Pessah (J2)",  
    "2026-09-12":"Roch Hachana","2026-09-13":"Roch Hachana (J2)","2026-09-21":"Kippour",  
    "2026-12-05":"Hanouka (1er jour)","2026-12-12":"Hanouka (Dernier jour)",  
    "2027-02-20":"Pourim","2027-03-22":"Pessah (J1)","2027-03-23":"Pessah (J2)",  
    "2027-10-02":"Roch Hachana","2027-10-03":"Roch Hachana (J2)","2027-10-11":"Kippour",  
    "2027-12-25":"Hanouka (1er jour)","2028-01-01":"Hanouka (Dernier jour)"  
};  

/* ── FÊTE DES MÈRES (dernier dim. de mai, décalé si Pentecôte) ── */  
function getMothersDay(yr){  
    let fdm=new Date(yr,4,31,12,0,0);  
    while(fdm.getDay()!==0)fdm.setDate(fdm.getDate()-1);  
    const easter=getEaster(yr);  
    const pentecost=new Date(easter);pentecost.setDate(easter.getDate()+49);  
    if(d2s(fdm)===d2s(pentecost))fdm.setDate(fdm.getDate()+7);  
    return d2s(fdm);  
}  

/* ── PÂQUES (Computus) ── */  
function getEaster(yr){  
    const a=yr%19,b=Math.floor(yr/100),c=yr%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;  
    return new Date(yr,mo-1,da,12,0,0);  
}  

/* ── JOURS FÉRIÉS FRANÇAIS ── */  
function getPH(year){  
    const easter=getEaster(year);  
    const add=n=>{const x=new Date(easter);x.setDate(x.getDate()+n);return d2s(x)};  
    return new Set([`${year}-01-01`,`${year}-05-01`,`${year}-05-08`,`${year}-07-14`,`${year}-08-15`,`${year}-11-01`,`${year}-11-11`,`${year}-12-25`,add(1),add(39),add(50)]);  
}  

/* ── NUMÉRO DE SEMAINE ISO ── */  
function isoWeek(date){  
    const tmp=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));  
    const dayN=tmp.getUTCDay()||7;  
    tmp.setUTCDate(tmp.getUTCDate()+4-dayN);  
    const yearStart=new Date(Date.UTC(tmp.getUTCFullYear(),0,1));  
    return Math.ceil((((tmp-yearStart)/86400000)+1)/7);  
}  

/* ── VÉRIFIER SI UNE DATE EST EN VACANCES ── */  
function getVacation(date){  
    const t=date.getTime();  
    for(const h of schoolHols){  
        if(t>=s2d(h.s).getTime()&&t<=s2d(h.e).getTime()) return h;  
    }  
    return null;  
}  

/* ══════════════════════════════════════════  
   ALGORITHME PRINCIPAL — JUGEMENT 06/02/2026  
   ══════════════════════════════════════════ */  
function getCustody(date){  
    const ds=d2s(date);  
    const yr=date.getFullYear();  
    const dow=date.getDay();  

    /* ── 1. EXCEPTION MANUELLE ── */  
    if(exceptions[ds]) return{who:exceptions[ds],why:"Exception manuelle",forced:true};  

    /* ── 2. FÊTE DES MÈRES / PÈRES ── */  
    if(ds===getMothersDay(yr)) return{who:"Maman",why:"Fête des Mères 💐"};  
    const fdp=new Date(yr,5,1,12,0,0);let sc=0;  
    while(sc<3){if(fdp.getDay()===0)sc++;if(sc<3)fdp.setDate(fdp.getDate()+1)}  
    if(ds===d2s(fdp)) return{who:"Papa",why:"Fête des Pères 👔"};  

    /* ── 3. VACANCES SCOLAIRES (PRIMAUTÉ ABSOLUE) ── */  
    const vac=getVacation(date);
