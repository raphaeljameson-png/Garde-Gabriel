<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Garde Gabriel</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23007AFF%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text y=%2250%22 x=%2250%22 fill=%22white%22 font-family=%22sans-serif%22 font-size=%2240%22 dominant-baseline=%22central%22 text-anchor=%22middle%22>G</text></svg>">
    
    <style>
        :root {
            /* iOS Light Theme */
            --desktop-bg: #e5e5ea; --app-bg: #f2f2f7; --text-main: #000000; --text-muted: #8e8e93;
            --card-bg: #ffffff; --tab-bg: rgba(255, 255, 255, 0.85); --border-color: rgba(60, 60, 67, 0.29);
            --papa-color: #007AFF; --maman-color: #FF3B30; --papa-bg: rgba(0, 122, 255, 0.12);
            --maman-bg: rgba(255, 59, 48, 0.12); --religious-color: #AF52DE; --holiday-color: #34C759;
            --seg-bg: rgba(118, 118, 128, 0.12); --seg-active: #ffffff; --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --desktop-bg: #111111; --app-bg: #000000; --text-main: #ffffff; --text-muted: rgba(235, 235, 245, 0.6);
                --card-bg: #1c1c1e; --tab-bg: rgba(28, 28, 30, 0.85); --border-color: rgba(84, 84, 88, 0.65);
                --papa-bg: rgba(10, 132, 255, 0.25); --maman-bg: rgba(255, 69, 58, 0.25);
                --religious-color: #BF5AF2; --holiday-color: #30D158; --seg-bg: rgba(118, 118, 128, 0.24); --seg-active: #636366;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--desktop-bg); display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 450px; background-color: var(--app-bg); color: var(--text-main); min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0, 0, 0, 0.1); overflow-x: hidden; padding-bottom: calc(80px + var(--safe-area-bottom)); }
        h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; margin: 0 0 20px; }
        h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin: 0 0 15px; }

        /* Tabs & Views */
        .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; height: calc(55px + var(--safe-area-bottom)); background: var(--tab-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 0.5px solid var(--border-color); display: flex; justify-content: space-around; padding-bottom: var(--safe-area-bottom); z-index: 1000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); font-size: 10px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
        .tab-item.active { color: var(--papa-color); }
        .tab-icon { font-size: 24px; margin-bottom: 2px; }
        .view { display: none; padding: 20px; padding-top: max(30px, env(safe-area-inset-top)); animation: slideUpFade 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .view.active { display: block; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Lists & Segmented Controls */
        .ios-list { background-color: var(--card-bg); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        .ios-list-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid var(--border-color); font-size: 16px; }
        .ios-list-row:last-child { border-bottom: none; }
        .row-left { display: flex; flex-direction: column; }
        .row-title { font-weight: 500; }
        .row-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .tag-papa { color: var(--papa-color); font-weight: 600; }
        .tag-maman { color: var(--maman-color); font-weight: 600; }
        .pct { font-size: 13px; font-weight: 400; opacity: 0.8; }
        .segmented-control { display: flex; background-color: var(--seg-bg); border-radius: 9px; padding: 2px; margin-bottom: 24px; }
        .segment { flex: 1; text-align: center; padding: 6px 0; font-size: 13px; font-weight: 600; border-radius: 7px; cursor: pointer; color: var(--text-main); transition: all 0.2s ease-in-out; }
        .segment.active { background-color: var(--seg-active); box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04); }

        /* Dist Bar & Status */
        .dist-container { margin: 15px 0 5px; }
        .dist-bar { display: flex; height: 14px; border-radius: 7px; overflow: hidden; background: var(--seg-bg); }
        .dist-papa { background-color: var(--papa-color); transition: width 0.5s; }
        .dist-maman { background-color: var(--maman-color); transition: width 0.5s; }
        .dist-labels { display: flex; justify-content: space-between; font-size: 14px; margin-top: 10px; font-weight: 600; }
        .today-status { text-align: center; padding: 20px 10px; }
        .status-circle { width: 140px; height: 140px; border-radius: 70px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; transition: transform 0.2s; }
        .status-circle.papa { background-color: var(--papa-bg); color: var(--papa-color); border: 4px solid var(--papa-color); }
        .status-circle.maman { background-color: var(--maman-bg); color: var(--maman-color); border: 4px solid var(--maman-color); }
        .btn { background-color: var(--papa-color); color: white; border: none; border-radius: 12px; padding: 14px 20px; font-size: 17px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; display: block; text-align: center; }
        .btn:active { opacity: 0.8; }
        .btn-outline { background-color: transparent; color: var(--papa-color); border: 1px solid var(--papa-color); }

        /* Calendar */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px; }
        .calendar-nav { background: var(--seg-bg); border: none; border-radius: 50%; width: 32px; height: 32px; color: var(--text-main); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; padding: 0 5px; }
        .day-name { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; border-radius: 50%; cursor: pointer; transition: all 0.2s; }
        .day.papa { background-color: var(--papa-bg); color: var(--papa-color); }
        .day.maman { background-color: var(--maman-bg); color: var(--maman-color); }
        .day.empty { visibility: hidden; }
        .day.today { border: 2.5px solid var(--text-main); font-weight: 700; }
        .day.exception { position: relative; }
        .day.exception::after { content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px; background: #FF9500; border-radius: 50%; }
        .day.religious { box-shadow: inset 0 0 0 2px var(--religious-color); }
        .day.publicholiday { box-shadow: inset 0 0 0 2px var(--holiday-color); }

        /* Year Grid */
        .year-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 0; }
        .mini-month { background: var(--card-bg); border-radius: 12px; padding: 12px; }
        .mini-month-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; text-align: center; color: var(--text-main); }
        .mini-calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; }
        .mini-day-name { font-size: 9px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
        .mini-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; border-radius: 50%; }
        .mini-day.papa { background-color: var(--papa-bg); color: var(--papa-color); }
        .mini-day.maman { background-color: var(--maman-bg); color: var(--maman-color); }
        .mini-day.today { border: 1.5px solid var(--text-main); font-weight: 700; }
        .mini-day.exception { border: 1px solid #FF9500; }
        .mini-day.religious { box-shadow: inset 0 0 0 1.5px var(--religious-color); }
        .mini-day.publicholiday { box-shadow: inset 0 0 0 1.5px var(--holiday-color); }
        
        .legend-container { margin-top: 25px; display: flex; gap: 12px; justify-content: center; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }

        @media print {
            .tab-bar, .btn, .segmented-control, .calendar-nav, h1 { display: none !important; }
            body, .app-container { background: white !important; box-shadow: none !important; }
            .view { display: none !important; padding: 0 !important; } .view.active { display: block !important; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ONGLET: AUJOURD'HUI -->
    <div id="view-today" class="view active">
        <h1>Aujourd'hui</h1>
        <div class="today-status">
            <h2 id="today-date" style="font-size: 18px; color: var(--text-muted); font-weight: 500; margin-bottom: 25px;"></h2>
            <div id="today-circle" class="status-circle"></div>
            <h3 id="today-reason" style="font-size: 15px; color: var(--text-muted); font-weight: 400; margin-top: 15px; padding: 0 20px; line-height: 1.4;"></h3>
            <button class="btn btn-outline" style="margin-top: 35px;" onclick="forceException()">Forcer un changement exceptionnel</button>
        </div>
        <h2 style="margin-top: 20px;">À venir</h2>
        <div class="ios-list" id="upcoming-list"></div>
    </div>

    <!-- ONGLET: MOIS -->
    <div id="view-calendar" class="view">
        <h1>Mois</h1>
        <div class="ios-list" style="padding: 20px 10px;">
            <div class="calendar-header">
                <button class="calendar-nav" onclick="changeMonth(-1)">❮</button>
                <h2 id="calendar-month-year" style="margin: 0; font-size: 18px;"></h2>
                <button class="calendar-nav" onclick="changeMonth(1)">❯</button>
            </div>
            <div class="calendar-grid" id="calendar-days"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="margin-top: 0; flex: 1;" onclick="goToToday()">Ce mois-ci</button>
            <button class="btn btn-outline" style="margin-top: 0; flex: 1;" onclick="window.print()">Imprimer</button>
        </div>
        <div class="legend-container">
            <span style="display: flex; align-items: center; gap: 4px;"><span style="color: var(--papa-color);">●</span> Papa</span>
            <span style="display: flex; align-items: center; gap: 4px;"><span style="color: var(--maman-color);">●</span> Maman</span>
            <span style="display: flex; align-items: center; gap: 4px;"><span style="color: #ff9500;">●</span> Modifié</span>
            <span style="display: flex; align-items: center; gap: 4px;"><span style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--religious-color);"></span> Fête juive</span>
            <span style="display: flex; align-items: center; gap: 4px;"><span style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--holiday-color);"></span> Lundi Férié</span>
        </div>
    </div>

    <!-- ONGLET: ANNÉE -->
    <div id="view-year" class="view">
        <h1>Année</h1>
        <div class="calendar-header" style="background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px;">
            <button class="calendar-nav" onclick="changeYearView(-1)">❮</button>
            <h2 id="year-view-title" style="margin: 0; font-size: 20px;"></h2>
            <button class="calendar-nav" onclick="changeYearView(1)">❯</button>
        </div>
        <div id="year-grid-container" class="year-grid-container"></div>
        <div class="legend-container" style="margin-top: 15px; margin-bottom: 15px;">
            <span style="display: flex; align-items: center; gap: 4px;"><span style="color: var(--papa-color);">●</span> Papa</span>
            <span style="display: flex; align-items: center; gap: 4px;"><span style="color: var(--maman-color);">●</span> Maman</span>
            <span style="display: flex; align-items: center; gap: 4px;"><span style="color: #ff9500;">●</span> Modifié</span>
            <span style="display: flex; align-items: center; gap: 4px;"><span style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--religious-color);"></span> Fête juive</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" style="margin-top: 0; flex: 1;" onclick="goToCurrentYear()">Année en cours</button>
        </div>
    </div>

    <!-- ONGLET: STATS -->
    <div id="view-stats" class="view">
        <h1>Statistiques</h1>
        <div class="segmented-control">
            <div class="segment active" id="stat-tab-months" onclick="switchStatTab('months')">Mois</div>
            <div class="segment" id="stat-tab-years" onclick="switchStatTab('years')">Années</div>
            <div class="segment" id="stat-tab-global" onclick="switchStatTab('global')">Bilan Global</div>
        </div>
        <div id="stats-months-view"><div class="ios-list" id="stats-months-list"></div></div>
        <div id="stats-years-view" style="display: none;"><div class="ios-list" id="stats-years-list"></div></div>
        <div id="stats-global-view" style="display: none;"><div id="stats-global-list"></div></div>
        <button class="btn" style="margin-top: 25px;" onclick="exportICS()">Exporter au format iCal (.ics)</button>
        <div style="text-align: center; margin-top:20px; font-size:11px; color:var(--text-muted);">Mise à jour auto : <span id="sync-status">Vérification...</span></div>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar">
        <a class="tab-item active" onclick="switchTab('today', this)"><span class="tab-icon">🏠</span><span>Aujourd'hui</span></a>
        <a class="tab-item" onclick="switchTab('calendar', this)"><span class="tab-icon">📅</span><span>Mois</span></a>
        <a class="tab-item" onclick="switchTab('year', this)"><span class="tab-icon">🗓️</span><span>Année</span></a>
        <a class="tab-item" onclick="switchTab('stats', this)"><span class="tab-icon">📊</span><span>Stats</span></a>
    </div>
</div>

    <script>
        // --- BASE DE DONNÉES LOCALE ET FALLBACKS ---
        let exceptions = JSON.parse(localStorage.getItem('gabriel_exceptions')) || {};
        
        // Base de secours pour les vacances (mise à jour via API ensuite)
        let schoolHolidays = JSON.parse(localStorage.getItem('gabriel_school_holidays')) || [
            { name: "Toussaint", start: "2024-10-19", end: "2024-11-03", midSaturday: "2024-10-26" },
            { name: "Noël", start: "2024-12-21", end: "2025-01-05", midSaturday: "2024-12-28" },
            { name: "Hiver", start: "2025-02-15", end: "2025-03-02", midSaturday: "2025-02-22" },
            { name: "Printemps", start: "2025-04-12", end: "2025-04-27", midSaturday: "2025-04-19" },
            { name: "Été", start: "2025-07-05", end: "2025-08-31", isSummer: true }
        ];

        // Base de secours pour les fêtes juives (mise à jour via API ensuite)
        let religiousHolidays = JSON.parse(localStorage.getItem('gabriel_religious_holidays')) || {
            "2024-10-03": "Roch Hachana", "2024-10-12": "Kippour", "2024-12-26": "Hanoukka (1er jour)", "2025-01-02": "Hanoukka (Dernier jour)",
            "2025-03-14": "Pourim", "2025-04-13": "Pessah", "2025-04-14": "Pessah"
        };

        function getStr(date) { return date.toISOString().split('T')[0]; }

        // --- CALCUL MATHÉMATIQUE DES JOURS FÉRIÉS (100% Autonome) ---
        function getPublicHolidays(year) {
            const h = [`${year}-01-01`, `${year}-05-01`, `${year}-05-08`, `${year}-07-14`, `${year}-08-15`, `${year}-11-01`, `${year}-11-11`, `${year}-12-25`];
            // Calcul Pâques
            const a = year % 19, b = Math.floor(year / 100), c = year % 100, d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3), h1 = (19 * a + b - d - g + 15) % 30, i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h1 - k) % 7, m = Math.floor((a + 11 * h1 + 22 * l) / 451), month = Math.floor((h1 + l - 7 * m + 114) / 31), day = ((h1 + l - 7 * m + 114) % 31) + 1;
            const easter = new Date(Date.UTC(year, month - 1, day));
            const easterMonday = new Date(easter.getTime() + 86400000);
            const ascension = new Date(easter.getTime() + 39 * 86400000);
            const pentecostMonday = new Date(easter.getTime() + 50 * 86400000);
            h.push(easterMonday.toISOString().split('T')[0], ascension.toISOString().split('T')[0], pentecostMonday.toISOString().split('T')[0]);
            return h;
        }

        // --- ALGORITHME DE GARDE ---
        function getCustody(date, skipMondayCheck = false) {
            const dateStr = getStr(date);
            const year = date.getFullYear();
            const isEvenYear = (year % 2 === 0);
            const dayOfWeek = date.getDay();
            
            // 1. Exception manuelle
            if (exceptions[dateStr]) return { status: exceptions[dateStr], reason: "Exception manuelle", forced: true };

            // 2. Fête des parents
            const mothersDay = new Date(year, 4, 31 - new Date(year, 4, 31).getDay());
            let fathersDay = new Date(year, 5, 1);
            fathersDay.setDate(fathersDay.getDate() + (7 - fathersDay.getDay()) + 14);
            if (dateStr === getStr(mothersDay)) return { status: "Maman", reason: "Fête des Mères" };
            if (dateStr === getStr(fathersDay)) return { status: "Papa", reason: "Fête des Pères" };

            // 3. Vacances Scolaires
            const time = date.getTime();
            let holiday = null;
            for(let h of schoolHolidays) {
                if(time >= new Date(h.start).getTime() && time <= new Date(h.end).getTime()) { holiday = h; break; }
            }
            if (holiday) {
                const isEvenHolidayYear = (parseInt(holiday.start.split('-')[0]) % 2 === 0);
                if (holiday.isSummer) {
                    const isFirstFortnight = date.getDate() <= 15;
                    let papaHasBlock = isEvenHolidayYear ? !isFirstFortnight : isFirstFortnight;
                    return { status: papaHasBlock ? "Papa" : "Maman", reason: `Vacances Été` };
                } else {
                    const midDate = new Date(holiday.midSaturday); midDate.setHours(12, 0, 0); 
                    const isFirstHalf = date.getTime() < midDate.getTime();
                    let papaHasHoliday = isEvenHolidayYear ? !isFirstHalf : isFirstHalf;
                    return { status: papaHasHoliday ? "Papa" : "Maman", reason: `Vacances ${holiday.name}` };
                }
            }

            // 4. Fêtes Juives
            const rHoliday = religiousHolidays[dateStr];
            if (rHoliday) return { status: isEvenYear ? "Papa" : "Maman", reason: `Fête juive (${rHoliday})` };

            // 5. Jours fériés (LUNDI) - Prolongement du week-end
            if (!skipMondayCheck && dayOfWeek === 1 && getPublicHolidays(year).includes(dateStr)) {
                let sunday = new Date(date);
                sunday.setDate(sunday.getDate() - 1);
                // On vérifie qui avait le dimanche (sans revérifier les lundis pour éviter les boucles)
                let sundayCustody = getCustody(sunday, true);
                return { status: sundayCustody.status, reason: `Lundi férié prolongé (${sundayCustody.status})`, isPublicHoliday: true };
            }

            // 6. Roulement classique
            let d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            let dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            let yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            let weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
            
            if (weekNo % 2 === 0) {
                if (dayOfWeek === 5 || dayOfWeek === 6 || dayOfWeek === 0) return { status: "Papa", reason: "Semaine Paire (Week-end)" };
            } else {
                if (dayOfWeek === 3) return { status: "Papa", reason: "Semaine Impaire (Mercredi)" };
            }

            return { status: "Maman", reason: "Roulement classique" };
        }

        // --- AFFICHAGE ---
        function renderToday() {
            const today = new Date();
            const custody = getCustody(today);
            document.getElementById('today-date').innerText = today.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            const circle = document.getElementById('today-circle');
            circle.className = `status-circle ${custody.status.toLowerCase()}`;
            circle.innerText = custody.status;
            document.getElementById('today-reason').innerText = custody.reason + (custody.forced ? " (Modifié manuellement)" : "");

            const list = document.getElementById('upcoming-list');
            list.innerHTML = "";
            let currentStatus = custody.status;
            let changesFound = 0;
            
            for(let i=1; i<=90 && changesFound < 5; i++) {
                let d = new Date(today); d.setDate(today.getDate() + i);
                let c = getCustody(d);
                if(c.status !== currentStatus) {
                    const dateStr = d.toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'});
                    list.innerHTML += `<div class="ios-list-row"><div class="row-left"><span class="row-title">${dateStr}</span><span class="row-subtitle">${c.reason}</span></div><span class="tag-${c.status.toLowerCase()}">${c.status}</span></div>`;
                    currentStatus = c.status; changesFound++;
                }
            }
        }

        let calDate = new Date(); calDate.setDate(1);
        function changeMonth(delta) { calDate.setMonth(calDate.getMonth() + delta); renderCalendar(); }
        function goToToday() { calDate = new Date(); calDate.setDate(1); renderCalendar(); }

        function renderCalendar() {
            const monthYear = calDate.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
            document.getElementById('calendar-month-year').innerText = monthYear.charAt(0).toUpperCase() + monthYear.slice(1);
            const grid = document.getElementById('calendar-days');
            grid.innerHTML = `<div class="day-name">Lun</div><div class="day-name">Mar</div><div class="day-name">Mer</div><div class="day-name">Jeu</div><div class="day-name">Ven</div><div class="day-name">Sam</div><div class="day-name">Dim</div>`;

            const year = calDate.getFullYear(); const month = calDate.getMonth();
            const firstDay = new Date(year, month, 1); const lastDay = new Date(year, month + 1, 0);
            let startDay = firstDay.getDay() || 7;
            
            for(let i=1; i<startDay; i++) grid.innerHTML += `<div class="day empty"></div>`;

            const todayStr = getStr(new Date());
            for(let d=1; d<=lastDay.getDate(); d++) {
                let date = new Date(year, month, d, 12, 0, 0);
                let dateStr = getStr(date);
                let custody = getCustody(date);
                let isReligious = !!religiousHolidays[dateStr];
                
                let classes = `day ${custody.status.toLowerCase()}`;
                if(dateStr === todayStr) classes += ' today';
                if(custody.forced) classes += ' exception';
                if(isReligious) classes += ' religious';
                if(custody.isPublicHoliday) classes += ' publicholiday'; // Marqueur vert pour lundi férié

                grid.innerHTML += `<div class="${classes}" onclick="toggleDay('${dateStr}')">${d}</div>`;
            }
        }

        let yearViewDate = new Date().getFullYear();
        function changeYearView(delta) { yearViewDate += delta; renderYearView(); }
        function goToCurrentYear() { yearViewDate = new Date().getFullYear(); renderYearView(); }

        function renderYearView() {
            document.getElementById('year-view-title').innerText = yearViewDate;
            const container = document.getElementById('year-grid-container');
            container.innerHTML = "";
            const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
            const todayStr = getStr(new Date());

            for (let m = 0; m < 12; m++) {
                let monthHtml = `<div class="mini-month"><div class="mini-month-title">${monthNames[m]}</div><div class="mini-calendar-grid"><div class="mini-day-name">L</div><div class="mini-day-name">M</div><div class="mini-day-name">M</div><div class="mini-day-name">J</div><div class="mini-day-name">V</div><div class="mini-day-name">S</div><div class="mini-day-name">D</div>`;
                const firstDay = new Date(yearViewDate, m, 1); const lastDay = new Date(yearViewDate, m + 1, 0);
                let startDay = firstDay.getDay() || 7;
                for (let i = 1; i < startDay; i++) monthHtml += `<div></div>`;

                for (let d = 1; d <= lastDay.getDate(); d++) {
                    let date = new Date(yearViewDate, m, d, 12, 0, 0);
                    let dateStr = getStr(date);
                    let custody = getCustody(date);
                    let isReligious = !!religiousHolidays[dateStr];

                    let classes = `mini-day ${custody.status.toLowerCase()}`;
                    if(dateStr === todayStr) classes += ' today';
                    if(custody.forced) classes += ' exception';
                    if(isReligious) classes += ' religious';
                    if(custody.isPublicHoliday) classes += ' publicholiday';

                    monthHtml += `<div class="${classes}">${d}</div>`;
                }
                monthHtml += `</div></div>`;
                container.innerHTML += monthHtml;
            }
        }

        // --- EXCEPTION & UI ---
        function toggleDay(dateStr) {
            const parts = dateStr.split('-'); const date = new Date(parts[0], parts[1]-1, parts[2], 12, 0, 0);
            const newStatus = getCustody(date).status === "Papa" ? "Maman" : "Papa";
            if(confirm(`Inverser exceptionnellement la garde pour le ${dateStr} ?`)) {
                exceptions[dateStr] = newStatus;
                localStorage.setItem('gabriel_exceptions', JSON.stringify(exceptions)); refreshAll();
            }
        }
        function forceException() { toggleDay(getStr(new Date())); }

        // --- STATS ---
        function switchStatTab(tabId) { /* Même logique qu'avant */
            document.getElementById('stat-tab-months').classList.toggle('active', tabId === 'months');
            document.getElementById('stat-tab-years').classList.toggle('active', tabId === 'years');
            document.getElementById('stat-tab-global').classList.toggle('active', tabId === 'global');
            document.getElementById('stats-months-view').style.display = tabId === 'months' ? 'block' : 'none';
            document.getElementById('stats-years-view').style.display = tabId === 'years' ? 'block' : 'none';
            document.getElementById('stats-global-view').style.display = tabId === 'global' ? 'block' : 'none';
        }
        function computeStats() { /* Même logique */
            const currentYear = new Date().getFullYear(); const stats = { months: {}, years: {} };
            [currentYear, currentYear + 1].forEach(year => {
                stats.years[year] = { papa: 0, maman: 0, total: 0 };
                for(let m=0; m<12; m++) {
                    const monthKey = `${year}-${String(m+1).padStart(2, '0')}`;
                    stats.months[monthKey] = { papa: 0, maman: 0, total: 0, date: new Date(year, m, 1) };
                    const daysInMonth = new Date(year, m+1, 0).getDate();
                    for(let d=1; d<=daysInMonth; d++) {
                        const date = new Date(year, m, d, 12, 0, 0); const c = getCustody(date);
                        stats.years[year].total++; stats.months[monthKey].total++;
                        c.status === "Papa" ? (stats.years[year].papa++, stats.months[monthKey].papa++) : (stats.years[year].maman++, stats.months[monthKey].maman++);
                    }
                }
            }); return stats;
        }
        function renderStats() { /* Même logique d'affichage que précédemment */
            const stats = computeStats();
            document.getElementById('stats-months-list').innerHTML = Object.keys(stats.months).sort().map(k => {
                const data = stats.months[k]; const pctPapa = Math.round((data.papa/data.total)*100)||0; const pctMaman = 100-pctPapa;
                return `<div class="ios-list-row"><span class="row-title">${data.date.toLocaleDateString('fr-FR', {month:'long', year:'numeric'})}</span><div style="font-size: 14px;"><span class="tag-papa">${data.papa}j (${pctPapa}%)</span> / <span class="tag-maman">${data.maman}j (${pctMaman}%)</span></div></div>`;
            }).join('');
            document.getElementById('stats-years-list').innerHTML = Object.keys(stats.years).sort().map(y => {
                const d = stats.years[y]; const pP = Math.round((d.papa/d.total)*100)||0; const pM = 100-pP;
                return `<div class="ios-list-row"><span class="row-title">Année ${y}</span><div style="text-align: right;"><div class="tag-papa">Papa: ${d.papa}j (${pP}%)</div><div class="tag-maman">Maman: ${d.maman}j (${pM}%)</div></div></div>`;
            }).join('');
            document.getElementById('stats-global-list').innerHTML = Object.keys(stats.years).sort().map(y => {
                const d = stats.years[y]; const pP = Math.round((d.papa/d.total)*100)||0; const pM = 100-pP;
                return `<div class="ios-list"><div style="padding: 20px 16px;"><h3 style="text-align: center; margin-top:0;">Répartition ${y}</h3><div class="dist-container"><div class="dist-bar"><div class="dist-papa" style="width: ${pP}%"></div><div class="dist-maman" style="width: ${pM}%"></div></div><div class="dist-labels"><span style="color:var(--papa-color)">Papa: ${pP}%</span><span style="color:var(--maman-color)">Maman: ${pM}%</span></div></div></div></div>`;
            }).join('');
        }

        function switchTab(tabId, el) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('view-' + tabId).classList.add('active'); document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
        function refreshAll() { renderToday(); renderCalendar(); renderYearView(); renderStats(); }

        // --- SYNCHRONISATION AUTONOME (La "connexion fantôme") ---
        async function syncExternalAPIs() {
            const lastSync = localStorage.getItem('gabriel_last_sync');
            const now = new Date().getTime();
            // Ne met à jour qu'une fois par semaine pour que l'app reste super rapide
            if (lastSync && now - lastSync < 7 * 24 * 3600 * 1000) {
                document.getElementById('sync-status').innerText = "Données à jour."; return;
            }

            try {
                // 1. Fêtes Juives (Hebcal)
                let cYear = new Date().getFullYear(); let newRelHolidays = {};
                for(let y of [cYear, cYear+1]) {
                    const res = await fetch(`https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=on&year=${y}`);
                    const data = await res.json();
                    data.items.forEach(item => {
                        if(!item.date) return; const t = item.title; const d = item.date;
                        if(t.includes('Rosh Hashana')) newRelHolidays[d] = 'Roch Hachana';
                        if(t.includes('Yom Kippur')) newRelHolidays[d] = 'Kippour';
                        if(t.includes('Purim') && !t.includes('Shushan')) newRelHolidays[d] = 'Pourim';
                        if(t.includes('Pesach I ') || t.includes('Pesach II ')) newRelHolidays[d] = 'Pessah';
                        // HANOUKA : Vos consignes (Uniquement 1er et dernier jour)
                        if(t.includes('Chanukah: 2 Candles')) newRelHolidays[d] = 'Hanoukka (1er jour)'; 
                        if(t.includes('Chanukah: 8th Day')) newRelHolidays[d] = 'Hanoukka (Dernier jour)';
                    });
                }
                if(Object.keys(newRelHolidays).length > 0) {
                    religiousHolidays = newRelHolidays; localStorage.setItem('gabriel_religious_holidays', JSON.stringify(newRelHolidays));
                }

                // 2. Vacances Scolaires (Gouvernement - Zone C)
                const eduRes = await fetch('https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-calendrier-scolaire/records?where=zones%20like%20%22%25Zone%20C%25%22%20and%20population%3D%22%C3%89l%C3%A8ves%22&limit=50');
                const eduData = await eduRes.json();
                let newSchoolHolidays = [];
                if(eduData && eduData.results) {
                    eduData.results.forEach(record => {
                        const desc = record.description;
                        if(desc.includes("Prérentrée") || desc.includes("Pont")) return;
                        let sDate = record.start_date.split('T')[0]; let eDate = record.end_date.split('T')[0];
                        let startD = new Date(sDate); startD.setDate(startD.getDate() + 7);
                        newSchoolHolidays.push({ name: desc.replace(/Vacances d[e']\s*/, ''), start: sDate, end: eDate, isSummer: desc.toLowerCase().includes("été"), midSaturday: startD.toISOString().split('T')[0] });
                    });
                    newSchoolHolidays.sort((a, b) => new Date(a.start) - new Date(b.start));
                    schoolHolidays = newSchoolHolidays; localStorage.setItem('gabriel_school_holidays', JSON.stringify(newSchoolHolidays));
                }

                localStorage.setItem('gabriel_last_sync', now.toString());
                document.getElementById('sync-status').innerText = "Synchronisé avec les sources officielles.";
                refreshAll(); // On rafraîchit discrètement si de nouvelles dates sont arrivées
            } catch (e) {
                document.getElementById('sync-status').innerText = "Mode hors-ligne (Dates pré-enregistrées).";
            }
        }

        // INITIALISATION
        refreshAll();
        setTimeout(syncExternalAPIs, 2000); // Lance la vérification discrètement 2 secondes après l'ouverture
    </script>
</body>
